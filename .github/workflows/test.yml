name: test
on:
  workflow_call:
    inputs:
      haxe:
        required: true
        type: string
      arch:
        required: true
        type: string
      sep:
        required: true
        type: string
      ext:
        required: true
        type: string
      os:
        required: true
        type: string
      target_flag:
        type: string
        default: ''
      execute:
        type: boolean
        default: true

env:
  HXCPP_ARCH_FLAG: ${{ inputs.arch == 'Arm64' && 'HXCPP_ARM64' || format('HXCPP_M{0}', inputs.arch) }}
  HAXE_TARGET_FLAG: ${{ inputs.target_flag && format('-D {0}', inputs.target_flag) || '' }}
  HXCPP_TARGET_FLAG: ${{ inputs.target_flag && format('-D{0}', inputs.target_flag) || '' }}

jobs:
  haxe:
    runs-on: ${{ inputs.os }}
    name: haxe
    defaults:
      run:
        working-directory: test/haxe
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/workflows/setup
        with:
          haxe: ${{ inputs.haxe }}
      - name: build
        run: haxe compile.hxml -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: run
        if: inputs.execute
        run: bin${{ inputs.sep }}TestMain

  cffi:
    runs-on: ${{ inputs.os }}
    name: cffi
    defaults:
      run:
        working-directory: test/cffi
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/workflows/setup
        with:
          haxe: ${{ inputs.haxe }}
      - name: build project
        working-directory: test/cffi/project
        run: haxelib run hxcpp build.xml -Ddebug -D${{ env.HXCPP_ARCH_FLAG }} ${{ env.HXCPP_TARGET_FLAG }}
      - name: build
        run: haxe compile.hxml --debug -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: build (utf8)
        run: haxe compile-utf8.hxml --debug -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: build (neko)
        run: haxe compile-neko.hxml --debug -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: copy
        if: inputs.execute
        run: cp project/ndll/*/prime${{ inputs.ext }} bin/neko/prime.ndll
      - name: run
        if: inputs.execute
        run: bin${{ inputs.sep }}cpp${{ inputs.sep }}TestMain-debug
      - name: run (utf8)
        if: inputs.execute
        run: bin${{ inputs.sep }}cpp-utf8${{ inputs.sep }}TestMain-debug
      - name: run (neko)
        if: inputs.execute && inputs.arch == '64'
        working-directory: test/cffi/bin/neko
        run: neko TestMain.n

  telemetry:
    strategy:
      fail-fast: false
      matrix:
        mode: [ debug, release ]
        include:
          - suffix: -debug
            mode: debug
    runs-on: ${{ inputs.os }}
    name: telemetry (${{ matrix.mode }})
    defaults:
      run:
        working-directory: test/telemetry
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/workflows/setup
        with:
          haxe: ${{ inputs.haxe }}
      - name: build
        run: haxe compile.hxml ${{ matrix.suffix }} -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: run
        if: inputs.execute
        run: bin${{ inputs.sep }}TestMain${{ matrix.suffix }}

  debugger:
    runs-on: ${{ inputs.os }}
    name: debugger
    defaults:
      run:
        working-directory: test/debugger
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/workflows/setup
        with:
          haxe: ${{ inputs.haxe }}
      - name: build
        run: haxe compile.hxml -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: run
        if: inputs.execute
        run: bin${{ inputs.sep }}App-debug

  native:
      runs-on: ${{ inputs.os }}
      name: native
      defaults:
        run:
          working-directory: test/native
      steps:
        - name: checkout
          uses: actions/checkout@v4
        - name: setup
          uses: ./.github/workflows/setup
          with:
            haxe: ${{ inputs.haxe }}
        - name: build
          run: haxe compile.hxml -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
        - name: run
          if: inputs.execute
          run: bin${{ inputs.sep }}Native

  std:
      runs-on: ${{ inputs.os }}
      name: std
      defaults:
        run:
          working-directory: test/std
      steps:
        - name: checkout
          uses: actions/checkout@v4
        - name: setup
          uses: ./.github/workflows/setup
          with:
            haxe: ${{ inputs.haxe }}
        - name: setup mariadb
          if: runner.os == 'Linux' && inputs.execute
          run: |
            set -ex
            sudo apt-get update -qqy
            sudo apt-get install -qqy mariadb-server
            sudo systemctl start mariadb
            sudo mariadb -u root -e "create database hxcpp; grant all privileges on hxcpp.* to hxcpp@localhost identified by 'hxcpp'; flush privileges;"
        - name: build
          run: haxe compile${{ inputs.arch }}.hxml ${{ env.HAXE_TARGET_FLAG }}
        - name: run
          if: inputs.execute
          run: ${{ inputs.arch == 'Arm64' && 'arm64' || format('cpp{0}', inputs.arch) }}${{ inputs.sep }}Test

  cppia:
    strategy:
      fail-fast: false
      matrix:
        mode: [ interp, jit ]
        include:
          - suffix: -jit
            mode: jit
    runs-on: ${{ inputs.os }}
    name: cppia (${{ matrix.mode }})
    defaults:
      run:
        working-directory: test/cppia
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/workflows/setup
        with:
          haxe: ${{ inputs.haxe }}
      - name: build host
        run: haxe compile-host.hxml -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: build client
        run: haxe compile-client.hxml -D ${{ env.HXCPP_ARCH_FLAG }} ${{ env.HAXE_TARGET_FLAG }}
      - name: run
        if: inputs.execute
        run: bin${{ inputs.sep }}CppiaHost bin${{ inputs.sep }}client.cppia ${{ matrix.suffix }}

  suite:
    runs-on: ${{ inputs.os }}
    name: haxe test suite
    defaults:
      run:
        working-directory: haxe/tests/unit
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: checkout haxe (latest)
        if: inputs.haxe == 'latest'
        uses: actions/checkout@v4
        with:
          repository: HaxeFoundation/haxe
          path: haxe
      - name: checkout haxe (stable)
        if: inputs.haxe != 'latest'
        uses: actions/checkout@v4
        with:
          repository: HaxeFoundation/haxe
          path: haxe
          ref: ${{ inputs.haxe }}
      - name: setup
        uses: ./.github/workflows/setup
        with:
          haxe: ${{ inputs.haxe }}
      - name: install haxe libs
        run: haxelib install compile-cpp.hxml --always
        # haxe 4 tests don't build with latest utest
        if: inputs.haxe != 'latest'
      - name: build
        run: haxe compile-cpp.hxml -D ${{ env.HXCPP_ARCH_FLAG }} -D no_http ${{ env.HAXE_TARGET_FLAG }}
      - name: run
        if: inputs.execute
        run: bin${{ inputs.sep }}cpp${{ inputs.sep }}TestMain-debug
  build_tool:
    runs-on: ${{ inputs.os }}
    name: build tool tests
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup
        uses: ./.github/workflows/setup
        with:
          haxe: ${{ inputs.haxe }}
      - name: test c/cxx_standard attributes
        working-directory: test/cxx_standard
        shell: bash
        run: |
          for xml in *.xml; do
            haxelib run hxcpp $xml ${{ env.HXCPP_TARGET_FLAG }}
            haxelib run hxcpp $xml clean
          done
